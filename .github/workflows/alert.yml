name: Trend Alert Bot

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch:

jobs:
  run-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore alert state
        id: alert-state
        uses: actions/cache/restore@v6
        with:
          path: alert_state.json
          key: alert-state-${{ github.run_id }}
          restore-keys: |
            alert-state-

      - name: Run tests
        run: python -m pytest -q

      - name: Run alert bot
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: python alert_bot.py

      - name: Save alert state
        if: ${{ always() && hashFiles('alert_state.json') != '' }}
        uses: actions/cache/save@v6
        with:
          path: alert_state.json
          key: ${{ steps.alert-state.outputs.cache-primary-key }}
